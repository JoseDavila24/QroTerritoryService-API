# ══════════════════════════════════════════════════════════════
# CONFIGURACIÓN DE BASE DE DATOS (MySQL)
# ══════════════════════════════════════════════════════════════
quarkus.datasource.db-kind=mysql
quarkus.datasource.jdbc.url=jdbc:mysql://db:3306/qro_territory_db
quarkus.datasource.username=user_qro
quarkus.datasource.password=pass_qro

# ══════════════════════════════════════════════════════════════
# HIBERNATE ORM (Panache)
# ══════════════════════════════════════════════════════════════
# 'update' crea las tablas automáticamente al iniciar si no existen
# Cambia a 'drop-and-create'
quarkus.hibernate-orm.database.generation=update
# Muestra las consultas SQL en la terminal (útil para debug)
quarkus.hibernate-orm.log.sql=true
# Ejecuta este archivo al arrancar para tener datos de prueba
quarkus.hibernate-orm.sql-load-script=import.sql

# ══════════════════════════════════════════════════════════════
# RUTA BASE DE LA API
# ══════════════════════════════════════════════════════════════
quarkus.http.root-path=/api/v1